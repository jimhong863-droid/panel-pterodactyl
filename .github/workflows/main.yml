name: Pterodactyl Panel
on:
  workflow_dispatch:
    inputs:
      admin_email: { description: "Email", required: true, default: "admin@example.com" }
      admin_username: { description: "Username", required: true, default: "yanzz" }
      admin_password: { description: "Password (min 8)", required: true, default: "7819159772" }
      duration_minutes: { description: "Menit hidup (max 350)", required: true, default: "300" }
      telegram_token: { description: "Token bot Telegram", required: true, default: "" }
      telegram_chat_id: { description: "Chat ID Telegram", required: true, default: "" }
jobs:
  pterodactyl:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Install deps
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y software-properties-common ca-certificates curl gnupg lsb-release
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update -y
          sudo apt-get install -y nginx mariadb-server redis-server tar unzip git \
            php8.2 php8.2-fpm php8.2-cli php8.2-gd php8.2-mysql php8.2-mbstring \
            php8.2-bcmath php8.2-xml php8.2-curl php8.2-zip php8.2-intl php8.2-sqlite3 composer
          sudo systemctl enable --now mariadb redis-server php8.2-fpm nginx
      - name: DB
        run: |
          sudo mysql -e "CREATE DATABASE panel;"
          sudo mysql -e "CREATE USER 'pterodactyl'@'127.0.0.1' IDENTIFIED BY 'ptero_pw_temp';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON panel.* TO 'pterodactyl'@'127.0.0.1' WITH GRANT OPTION;"
          sudo mysql -e "FLUSH PRIVILEGES;"
      - name: Download panel
        run: |
          sudo mkdir -p /var/www/pterodactyl
          cd /var/www/pterodactyl
          sudo curl -Lo panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz
          sudo tar -xzf panel.tar.gz && sudo rm panel.tar.gz
          sudo chmod -R 755 storage/* bootstrap/cache/
          sudo cp .env.example .env
          sudo composer install --no-dev --optimize-autoloader --working-dir=/var/www/pterodactyl --no-interaction
      - name: Tunnel
        id: tunnel
        run: |
          curl -L -o cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cf.deb
          nohup cloudflared tunnel --url http://localhost:80 --no-autoupdate > /tmp/cf.log 2>&1 &
          for i in $(seq 1 30); do
            URL=$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1 || true)
            [ -n "$URL" ] && { echo "panel_url=$URL" >> "$GITHUB_OUTPUT"; echo "URL: $URL"; break; }
            sleep 2
          done
      - name: Konfig panel
        env:
          PANEL_URL: ${{ steps.tunnel.outputs.panel_url }}
          ADMIN_EMAIL: ${{ github.event.inputs.admin_email }}
        run: |
          cd /var/www/pterodactyl
          sudo php artisan key:generate --force
          sudo php artisan p:environment:setup --author="$ADMIN_EMAIL" --url="$PANEL_URL" \
            --timezone="Asia/Jakarta" --cache="redis" --session="redis" --queue="redis" \
            --redis-host="127.0.0.1" --redis-pass="null" --redis-port="6379" --settings-ui=true
          sudo php artisan p:environment:database --host="127.0.0.1" --port="3306" \
            --database="panel" --username="pterodactyl" --password="ptero_pw_temp"
          sudo php artisan migrate --seed --force
      - name: User admin
        env:
          ADMIN_EMAIL: ${{ github.event.inputs.admin_email }}
          ADMIN_USER: ${{ github.event.inputs.admin_username }}
          ADMIN_PASS: ${{ github.event.inputs.admin_password }}
        run: |
          cd /var/www/pterodactyl
          sudo php artisan p:user:make --email="$ADMIN_EMAIL" --username="$ADMIN_USER" \
            --name-first="Admin" --name-last="User" --password="$ADMIN_PASS" --admin=1
          sudo chown -R www-data:www-data /var/www/pterodactyl/*
      - name: Location & Node
        id: node
        run: |
          cd /var/www/pterodactyl
          sudo php artisan tinker --execute="
          use Pterodactyl\Services\Locations\LocationCreationService;
          use Pterodactyl\Services\Nodes\NodeCreationService;
          \$loc = app(LocationCreationService::class)->handle(['short'=>'local','long'=>'Runner']);
          \$node = app(NodeCreationService::class)->handle(['name'=>'node-runner','description'=>'Auto','location_id'=>\$loc->id,'public'=>true,'fqdn'=>'127.0.0.1','scheme'=>'http','behind_proxy'=>false,'memory'=>4096,'memory_overallocate'=>0,'disk'=>8192,'disk_overallocate'=>0,'upload_size'=>100,'daemon_listen'=>8080,'daemon_sftp'=>2022,'daemon_base'=>'/var/lib/pterodactyl/volumes']);
          file_put_contents('/tmp/nid', \$node->id);
          " 2>&1 | tail -10
          echo "node_id=$(cat /tmp/nid)" >> "$GITHUB_OUTPUT"
      - name: Allocation
        env:
          NID: ${{ steps.node.outputs.node_id }}
        run: |
          cd /var/www/pterodactyl
          sudo php artisan p:node:allocations --node="$NID" --ip="127.0.0.1" --ports="25565-25570" || true
      - name: Wings install + start + tunggu HIJAU
        env:
          NID: ${{ steps.node.outputs.node_id }}
        run: |
          set -e
          sudo mkdir -p /etc/pterodactyl /var/lib/pterodactyl /var/log/pterodactyl
          sudo curl -fsSL -o /usr/local/bin/wings https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64
          sudo chmod +x /usr/local/bin/wings
          sudo systemctl start docker 2>/dev/null || sudo service docker start 2>/dev/null || (sudo nohup dockerd >/var/log/dockerd.log 2>&1 &)
          for i in $(seq 1 15); do sudo docker info >/dev/null 2>&1 && break; sleep 2; done
          sudo docker info >/dev/null 2>&1 || { echo "::error::Docker fail"; exit 1; }
          cd /var/www/pterodactyl
          sudo rm -f /etc/pterodactyl/config.yml
          sudo php artisan p:node:configuration "$NID" | sudo tee /etc/pterodactyl/config.yml >/dev/null
          sudo grep -q "^uuid:" /etc/pterodactyl/config.yml || { echo "::error::Config invalid"; sudo cat /etc/pterodactyl/config.yml; exit 1; }
          sudo pkill -9 wings 2>/dev/null || true
          sleep 2
          sudo rm -f /var/log/wings.log
          sudo bash -c "nohup /usr/local/bin/wings --config /etc/pterodactyl/config.yml > /var/log/wings.log 2>&1 &"
          OK=0
          for i in $(seq 1 30); do
            sleep 2
            if sudo ss -tlnp 2>/dev/null | grep -q ":8080"; then
              CODE=$(curl -sS --max-time 3 -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ || echo 0)
              [ "$CODE" != "0" ] && { echo "Wings HIDUP (code=$CODE,try=$i)"; OK=1; break; }
            fi
            echo "  ...nunggu wings ($i/30)"
          done
          [ "$OK" = "1" ] || { echo "::error::Wings fail"; sudo tail -40 /var/log/wings.log; exit 1; }
          sudo ss -tlnp | grep 8080
      - name: Auto-revive Wings tiap login SSH
        run: |
          sudo tee /usr/local/bin/wings-up >/dev/null <<'SH'
          #!/bin/bash
          if pgrep -x wings >/dev/null; then
            echo "[wings-up] Wings hidup."
          else
            echo "[wings-up] Wings mati, restart..."
            (systemctl start docker 2>/dev/null || (nohup dockerd >/var/log/dockerd.log 2>&1 &))
            sleep 3
            NID=$(cd /var/www/pterodactyl && php artisan tinker --execute="echo \Pterodactyl\Models\Node::value('id');" 2>/dev/null | tail -1 | tr -dc '0-9')
            [ -n "$NID" ] && (cd /var/www/pterodactyl && php artisan p:node:configuration "$NID" > /etc/pterodactyl/config.yml)
            nohup /usr/local/bin/wings --config /etc/pterodactyl/config.yml >/var/log/wings.log 2>&1 &
            sleep 5
            ss -tlnp 2>/dev/null | grep -q :8080 && echo "[wings-up] OK" || { echo "[wings-up] FAIL"; tail -15 /var/log/wings.log; }
          fi
          SH
          sudo chmod +x /usr/local/bin/wings-up
          sudo tee /etc/profile.d/zz-wings-up.sh >/dev/null <<'PROF'
          if [ -n "$SSH_CONNECTION" ] || [ -n "$TMATE_VERSION" ]; then
            sudo /usr/local/bin/wings-up 2>/dev/null || /usr/local/bin/wings-up
          fi
          PROF
          sudo chmod +x /etc/profile.d/zz-wings-up.sh
      - name: Nginx
        run: |
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo tee /etc/nginx/sites-available/ptero.conf >/dev/null <<'NG'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/pterodactyl/public;
              index index.php;
              client_max_body_size 100m;
              location / { try_files $uri $uri/ /index.php?$query_string; }
              location ~ \.php$ {
                  fastcgi_split_path_info ^(.+\.php)(/.+)$;
                  fastcgi_pass unix:/run/php/php8.2-fpm.sock;
                  fastcgi_index index.php;
                  include fastcgi_params;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  fastcgi_param HTTP_PROXY "";
                  fastcgi_read_timeout 300;
              }
          }
          NG
          sudo ln -sf /etc/nginx/sites-available/ptero.conf /etc/nginx/sites-enabled/ptero.conf
          sudo nginx -t && sudo systemctl reload nginx
      - name: Queue & cron
        run: |
          sudo tee /etc/systemd/system/pteroq.service >/dev/null <<'U'
          [Unit]
          Description=Pterodactyl Queue
          After=redis-server.service
          [Service]
          User=www-data
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /var/www/pterodactyl/artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          U
          sudo systemctl daemon-reload && sudo systemctl enable --now pteroq
          ( sudo crontab -l 2>/dev/null; echo "* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1" ) | sudo crontab -
      - name: INFO LOGIN
        env:
          PANEL_URL: ${{ steps.tunnel.outputs.panel_url }}
          ADMIN_USER: ${{ github.event.inputs.admin_username }}
        run: |
          echo "=========================================="
          echo "  URL      : $PANEL_URL"
          echo "  Username : $ADMIN_USER"
          echo "=========================================="
          { echo "## Panel siap"; echo "- URL: $PANEL_URL"; echo "- User: \`$ADMIN_USER\`"; } >> "$GITHUB_STEP_SUMMARY"
      - name: SSH tmate
        id: tmate
        uses: mxschmitt/action-tmate@v3
        with: { limit-access-to-actor: false, detached: true }
      - name: Ambil URL tmate
        id: sshurl
        run: |
          sleep 5
          echo "tmate_url=$(sudo tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null || echo)" >> "$GITHUB_OUTPUT"
      - name: Bot Telegram
        env:
          TG_TOKEN: ${{ github.event.inputs.telegram_token }}
          TG_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
          PANEL_URL: ${{ steps.tunnel.outputs.panel_url }}
          TMATE_URL: ${{ steps.sshurl.outputs.tmate_url }}
        run: |
          [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ] && { echo "Bot di-skip"; exit 0; }
          sudo -E nohup python3 .github/scripts/telegram-bot.py > /tmp/bot.log 2>&1 &
          sleep 3
          tail -10 /tmp/bot.log || true
      - name: Tahan hidup
        run: |
          MIN="${{ github.event.inputs.duration_minutes }}"
          [ "$MIN" -gt 350 ] && MIN=350
          for i in $(seq 1 "$MIN"); do sleep 60; echo "[$i/$MIN] $(date -u +%H:%M:%S)"; done
