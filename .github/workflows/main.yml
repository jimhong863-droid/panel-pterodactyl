name: Free VPS (GitHub Runner)

on:
  workflow_dispatch:
    inputs:
      ssh_password:
        description: "Password root buat SSH (min 8 char)"
        required: true
        default: "yanz12345"
      enable_tmate:
        description: "Aktifin tmate SSH? (paling stabil)"
        required: true
        default: "true"
      enable_ngrok:
        description: "Aktifin ngrok SSH? (butuh NGROK_AUTH_TOKEN)"
        required: true
        default: "false"
      enable_cloudflared:
        description: "Aktifin Cloudflare Tunnel SSH?"
        required: true
        default: "true"
      install_extras:
        description: "Install extra (docker,nodejs,python,nginx)?"
        required: true
        default: "true"
      keep_alive_hours:
        description: "Berapa jam VPS hidup (max 5.8)"
        required: true
        default: "5.5"

  schedule:
    # Auto re-run tiap 5 jam 50 menit biar 'lifetime'
    # - cron: "0 */5 * * *"

jobs:
  vps:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    defaults:
      run:
        shell: bash

    steps:
      - name: Info Sistem
        run: |
          echo "=========================================="
          echo " 🖥️  FREE VPS — GitHub Actions Runner"
          echo "=========================================="
          echo " OS    : $(lsb_release -ds)"
          echo " Kernel: $(uname -r)"
          echo " CPU   : $(nproc) core ($(lscpu | grep 'Model name' | sed 's/Model name:[[:space:]]*//'))"
          echo " RAM   : $(free -h | awk '/Mem:/ {print $2}')"
          echo " Disk  : $(df -h / | awk 'NR==2 {print $4 " free / " $2 " total"}')"
          echo " IP    : $(curl -s ifconfig.me || echo 'N/A')"
          echo "=========================================="

      - name: Setup root password & SSH
        run: |
          set -euxo pipefail
          PASS="${{ github.event.inputs.ssh_password }}"
          if [ ${#PASS} -lt 8 ]; then echo "Password min 8 karakter"; exit 1; fi
          echo "root:$PASS" | sudo chpasswd
          sudo sed -i 's/#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl enable --now ssh || sudo systemctl enable --now sshd || true
          sudo systemctl restart ssh || sudo systemctl restart sshd || true
          ss -tlnp | grep ':22' || true

      - name: Install Extras (docker, nodejs, python, nginx, dll)
        if: ${{ github.event.inputs.install_extras == 'true' }}
        run: |
          set -euxo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            curl wget git nano vim htop tmux screen unzip zip tar \
            build-essential python3 python3-pip python3-venv \
            nginx ufw net-tools jq ca-certificates openssl \
            ffmpeg sqlite3 zstd
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://get.docker.com | sudo sh
          fi
          sudo systemctl enable --now docker || true
          echo "----- VERSI -----"
          node -v && npm -v && python3 --version && docker --version && nginx -v
          echo "-----------------"

      - name: Restore data dari cache (persistent storage hack)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/vps-data
            /home/runner/.config
            /home/runner/.ssh
          key: vps-data-${{ github.run_id }}
          restore-keys: |
            vps-data-

      - name: Setup workspace persistent
        run: |
          mkdir -p /home/runner/vps-data
          echo "📁 Folder /home/runner/vps-data tersimpan antar-run pake cache"
          ls -la /home/runner/vps-data || true

      - name: Cloudflare Tunnel SSH
        if: ${{ github.event.inputs.enable_cloudflared == 'true' }}
        run: |
          set -euxo pipefail
          curl -fsSL -o /tmp/cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb
          nohup cloudflared access tcp --hostname ssh-vps --url tcp://localhost:22 > /tmp/cf-ssh.log 2>&1 &
          nohup cloudflared tunnel --no-autoupdate --url tcp://localhost:22 > /tmp/cf-tcp.log 2>&1 &
          sleep 8
          echo "===== CLOUDFLARE TUNNEL ====="
          grep -Eo 'https?://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-tcp.log | head -n1 || true
          cat /tmp/cf-tcp.log | tail -20

      - name: Ngrok SSH (opsional, butuh secret NGROK_AUTH_TOKEN)
        if: ${{ github.event.inputs.enable_ngrok == 'true' && env.NGROK_AUTH_TOKEN != '' }}
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          set -euxo pipefail
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"
          nohup ngrok tcp 22 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 8
          NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "===== NGROK SSH ====="
          echo "Connect: ssh root@${NGROK_URL#tcp://}"
          echo "Password: ${{ github.event.inputs.ssh_password }}"

      - name: Tampilkan info konek
        run: |
          echo ""
          echo "=========================================================="
          echo " 🚀 VPS SIAP DIGUNAKAN!"
          echo "=========================================================="
          echo " 👤 User    : root"
          echo " 🔑 Password: ${{ github.event.inputs.ssh_password }}"
          echo " ⏱️  Hidup  : sampai ${{ github.event.inputs.keep_alive_hours }} jam"
          echo ""
          echo " 📡 Cara konek:"
          echo "   1. tmate (paling gampang) → liat link/ssh di step 'tmate SSH'"
          echo "   2. cloudflared TCP        → liat di step 'Cloudflare Tunnel SSH'"
          echo "   3. ngrok                  → liat di step 'Ngrok SSH'"
          echo ""
          echo " 💾 Folder persistent: /home/runner/vps-data"
          echo "    (otomatis disimpan & dipulihkan antar-run via cache)"
          echo "=========================================================="

      - name: tmate SSH (paling stabil & gampang)
        if: ${{ github.event.inputs.enable_tmate == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: true

      - name: Keep-alive (jaga VPS tetap hidup)
        run: |
          set -e
          HOURS="${{ github.event.inputs.keep_alive_hours }}"
          MAX=5.8
          if (( $(echo "$HOURS > $MAX" | bc -l) )); then HOURS=$MAX; fi
          SECONDS_TOTAL=$(echo "$HOURS * 3600" | bc | cut -d. -f1)
          END_TIME=$(($(date +%s) + SECONDS_TOTAL))
          echo "⏰ VPS akan hidup sampai: $(date -d @$END_TIME)"
          while [ $(date +%s) -lt $END_TIME ]; do
            REMAIN=$(( (END_TIME - $(date +%s)) / 60 ))
            echo "[$(date '+%H:%M:%S')] 💚 VPS hidup — sisa $REMAIN menit"
            sleep 300
          done
          echo "⏹️ Waktu habis, mematikan VPS..."

      - name: Backup data ke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-data-backup-${{ github.run_id }}
          path: /home/runner/vps-data
          retention-days: 7
          if-no-files-found: ignore
