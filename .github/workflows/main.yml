name: Pterodactyl Panel (Temporary)

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: "Email admin Pterodactyl"
        required: true
        default: "admin@example.com"
      admin_username:
        description: "Username admin"
        required: true
        default: "yanzz"
      admin_password:
        description: "Password admin (min 8 karakter)"
        required: true
        default: "7819159772"
      duration_minutes:
        description: "Berapa menit panel hidup (max 350)"
        required: true
        default: "300"
      telegram_token:
        description: "Token bot Telegram (BotFather)"
        required: true
        default: ""
      telegram_chat_id:
        description: "Chat ID kamu (dari @userinfobot)"
        required: true
        default: ""

jobs:
  pterodactyl:
    name: Install & Run Pterodactyl Panel
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Info runner
        run: |
          echo "CPU: $(nproc), RAM:"; free -h
          echo "OS:"; lsb_release -a 2>/dev/null

      - name: Install dependencies (PHP, MariaDB, Redis, Nginx)
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y software-properties-common ca-certificates curl gnupg lsb-release
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update -y
          sudo apt-get install -y \
            nginx mariadb-server redis-server tar unzip git \
            php8.2 php8.2-fpm php8.2-cli php8.2-gd php8.2-mysql php8.2-mbstring \
            php8.2-bcmath php8.2-xml php8.2-curl php8.2-zip php8.2-intl php8.2-sqlite3 \
            composer
          php -v
          sudo systemctl enable --now mariadb redis-server php8.2-fpm nginx

      - name: Setup database Pterodactyl
        run: |
          sudo mysql -e "CREATE DATABASE panel;"
          sudo mysql -e "CREATE USER 'pterodactyl'@'127.0.0.1' IDENTIFIED BY 'ptero_pw_temp';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON panel.* TO 'pterodactyl'@'127.0.0.1' WITH GRANT OPTION;"
          sudo mysql -e "FLUSH PRIVILEGES;"

      - name: Download Pterodactyl Panel
        run: |
          sudo mkdir -p /var/www/pterodactyl
          cd /var/www/pterodactyl
          sudo curl -Lo panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz
          sudo tar -xzvf panel.tar.gz > /dev/null
          sudo rm panel.tar.gz
          sudo chmod -R 755 storage/* bootstrap/cache/
          sudo cp .env.example .env
          sudo composer install --no-dev --optimize-autoloader --working-dir=/var/www/pterodactyl --no-interaction

      - name: Setup cloudflared tunnel (dapatkan URL publik)
        id: tunnel
        run: |
          curl -L --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.
